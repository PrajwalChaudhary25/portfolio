<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Inbox</title>
    <link rel="icon" type="image/x-icon" href="icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-[#126413] p-6 shadow-lg mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-white text-2xl font-bold tracking-tight">Admin Dashboard</h1>
            <button onclick="fetchMessages()" class="bg-white text-[#126413] px-4 py-2 rounded-lg font-semibold hover:bg-gray-100 transition">
                Refresh Messages
            </button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4">
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
            <div class="overflow-y-auto h-96 scrollbar-style">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50 sticky top-0">
                        <tr>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Name</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Email</th>
                            <th class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Message</th>
                        </tr>
                    </thead>
                    <tbody id="message-body" class="bg-white divide-y divide-gray-200">
                        <tr>
                            <td colspan="4" class="px-6 py-10 text-center text-gray-400">Loading messages...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <style>
        .scrollbar-style::-webkit-scrollbar {
            width: 6px;            height: 8px;        }
        
        .scrollbar-style::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        .scrollbar-style::-webkit-scrollbar-thumb {
            background: #126413;
            border-radius: 4px;
        }
        
        .scrollbar-style::-webkit-scrollbar-thumb:hover {
            background: #0d4a0a;
        }
    </style>

    <script>
        async function fetchMessages() {
            const tbody = document.getElementById('message-body');
            
            try {
                const response = await fetch('http://localhost:3000/api/contact-messages');
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error('API returned status ' + response.status);
                }
                
                const data = await response.json();
                console.log('Fetched messages:', data);
                console.log('Data type:', typeof data, 'Is array?', Array.isArray(data));

                // Clear the "Loading..." row
                tbody.innerHTML = '';

                if (!Array.isArray(data) || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-gray-500">No messages found in the database.</td></tr>`;
                    return;
                }

                // Loop through your JSON data and create rows
                data.forEach((msg, index) => {
                    console.log(`Processing message ${index}:`, msg);
                    const row = `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-mono text-gray-400">#${msg.id}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-bold text-gray-900">${msg.name}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-[#126413] underline">${msg.email}<td class="px-6 py-4 text-sm text-gray-600 italic max-w-xs break-words">"${msg.message}"</td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
                console.log('Finished rendering messages');

            } catch (error) {
                console.error('Error fetching data:', error);
                tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-red-500 font-bold">Error: ${error.message}</td></tr>`;
            }
        }

        // Initial fetch when page loads
        fetchMessages();
    </script>
</body>
</html>
