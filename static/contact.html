<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/x-icon" href="icon.png">
</head>
<body class="bg-[#126413] flex items-center justify-center min-h-screen p-6">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-8 border-t-8 border-[#126413]">
        <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">Contact Me</h1>
        <p class="text-gray-500 text-center mb-8">I'd love to hear from you. Drop me a message below!</p>

        <form class="space-y-6" onsubmit="handleSubmit(event)">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name <span class="text-[#126413] font-bold">*</span></label>
                <input type="text" id="name" name="name" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#126413] focus:border-transparent outline-none transition duration-200"
                    placeholder="Enter your name">
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email <span class="text-[#126413] font-bold">*</span></label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#126413] focus:border-transparent outline-none transition duration-200"
                    placeholder="you@example.com">
            </div>

            <div>
                <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message <span class="text-[#126413] font-bold">*</span></label>
                <textarea id="message" name="message" rows="5" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#126413] focus:border-transparent outline-none transition duration-200 resize-none"
                    placeholder="Your message here..."></textarea>
                
                <div class="flex justify-between mt-2">
                    <span id="word-count-msg" class="text-xs text-gray-400 italic">Maximum 1000 characters</span>
                    <span id="counter" class="text-xs text-gray-500 font-medium">0 / 200 characters</span>
                </div>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-[#126413] hover:bg-[#105611] text-white font-bold py-3 rounded-lg shadow-lg hover:shadow-xl transition duration-300 transform hover:-translate-y-1">
                Send Message
            </button>
        </form>
    </div>

    <script>
        const textarea = document.getElementById('message');
        const counter = document.getElementById('counter');
        
        console.log('Textarea element:', textarea);
        console.log('Counter element:', counter);

        function updateCounter() {
            const charCount = textarea.value.length;
            const maxChars = 200;
            
            console.log('Char count:', charCount, 'Text:', textarea.value);

            if (charCount > maxChars) {
                // Trim the text if it exceeds 200 characters
                textarea.value = textarea.value.substring(0, maxChars);
                counter.textContent = `${maxChars} / ${maxChars} characters`;
                counter.classList.add('text-red-500');
            } else {
                counter.textContent = `${charCount} / ${maxChars} characters`;
                counter.classList.remove('text-red-500');
            }
        }

        textarea.addEventListener('input', updateCounter);
        textarea.addEventListener('change', updateCounter);

    async function handleSubmit(event) {
        event.preventDefault();
        const btn = document.getElementById('submit-btn');
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;

        // 3. UI Feedback: Change button to "Sending..."
        btn.disabled = true;
        btn.innerText = "Sending...";
        btn.style.opacity = "0.7";

        try {
            // 4. THE AJAX REQUEST
            const response = await fetch('http://localhost:3000/api/contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, message })
            });

            if (response.ok) {
                alert("Success! Your message is in the database.");
                event.target.reset(); // Clear the form
                document.getElementById('counter').innerText = "0 / 1000 characters";
            } else {
                alert("Something went wrong on the server");
            }
        } catch (error) {
            console.error("Error:", error);
            alert("Could not connect to the server.");
        } finally {
            // 5. Restore the button
            btn.disabled = false;
            btn.innerText = "Send Message";
            btn.style.opacity = "1";
        }
}
    </script>

</body>
</html>
